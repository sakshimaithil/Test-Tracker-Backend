services:
  - type: web
    name: test-tracker-backend
    runtime: python
    pythonVersion: 3.11
    buildCommand: pip install -r new_backend/requirements.txt
    startCommand: cd new_backend && gunicorn main:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: test_tracker_db
          property: connectionString
      - key: ENVIRONMENT
        value: production
